name: industrial-safety-platform-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python -m py_compile backend/app/main.py ai/training/train_models.py rag/build_rag_index.py knowledge_graph/build_graph.py
      - run: pytest -q

