rejected_or_gap_sources:
  - need: PPE detection / CCTV worker safety
    reason: Strong public datasets exist but many are Kaggle-authenticated, unclear commercial license, small, or not industry-specific.
    recommended_next_step: Use COCO/OpenImages for generic person/PPE pretraining only after license review; collect site CCTV with consent for deployment.
  - need: Permit-to-work records
    reason: Real permit, isolation, hot-work, confined-space, and LOTO records are rarely public because they expose plant operations.
    recommended_next_step: Build schema from OSHA/OISD/company SOPs; synthesize only workflow metadata for demos and label it synthetic.
  - need: Plant layouts and hazard zones
    reason: Facility maps are security-sensitive and generally not public.
    recommended_next_step: Use OpenStreetMap only for external facility context; build synthetic digital twin layouts from public P&ID examples or customer-provided CAD.
  - need: SCADA incident telemetry
    reason: Useful public datasets such as SWaT/WADI often require request/registration and redistribution may be restricted.
    recommended_next_step: Request access from dataset owner; keep outside repo until license allows storage.
